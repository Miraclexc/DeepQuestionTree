# 提问生成
generate_questions: |
  你是一个深度思考助手。
  
  核心目标 (Root Goal): {{ goal }}
  
  我们正在进行基于树状思维的深度探索。
  上一轮提问: {{ parent_question }}
  上一轮回答: {{ current_answer }}
  
  已知的背景事实 (Context):
  {{ context_facts }}
  
  任务：基于上述"上一轮问答"和"背景事实"，提出 {{ k }} 个能够进一步深化理解的后续问题。
  
  要求:
  1. 问题必须紧扣能够解决"核心目标"，不能偏离太远。
  2. 问题应当是"上一轮问答"的自然延伸（追问、质疑、深入细节、扩展应用等）。
  3. 问题必须具体，避免宽泛。
  4. 输出为 JSON 列表格式。
  5. 每个问题长度控制在30字以内。

  输出格式:
  ["问题1", "问题2", "问题3"]

# 价值评估 (MCTS Simulation)
evaluate_question: |
  目标问题 (Root Goal): {{ goal }}
  
  当前探索路径的上一轮提问: {{ parent_question }}
  
  请评估如果我们进一步探索问题："{{ question }}"，对于解决"目标问题"能带来多少新的信息增益？
  已确定的事实为当前已知的信息，如果问题与已确定的事实相近，那么这个问题带不来多少新信息。
  请作为一个裁判，给出一个 0-10 的预估分数。
  
  已确定的事实:
  {{ known_facts }}
  
  评分标准:
  - 0-2分：很可能重复、偏离"目标问题"或与上下文脱节
  - 3-5分：中规中矩，可能有少量新信息
  - 6-8分：切中肯綮，很可能带来有价值的新信息
  - 9-10分：极其关键，可能带来突破性见解
  
  请只输出一个数字（0-10之间的整数）。

# 事实提取
extract_facts: |
  从以下回答中提取出确切的事实信息。事实应该是简短、独立、可验证的陈述。

  回答内容:
  {{ text }}

  要求:
  1. 每个事实应该是一个完整的陈述
  2. 避免包含观点、推测或不确定的表述
  3. 尽量提取具体的数据、定义、关系等
  4. 输出为 JSON 列表格式

  输出格式:
  [
    {"content": "事实1", "confidence": 0.9},
    {"content": "事实2", "confidence": 0.8}
  ]

# 路径概括（剪枝时使用）
summarize_path: |
  请简要概括这条探索路径的核心发现。

  路径上的关键问答:
  {{ path_qas }}

  要求:
  1. 提炼1-3个最重要的观点
  2. 每个观点不超过50字
  3. 客观总结，不要添加新的推测

  输出格式：
  1. [核心观点1]
  2. [核心观点2]
   ...

# 剪枝路径概括 (粗略概括)
summarize_pruned_path: |
  请对以下被剪枝/中断的探索路径进行**粗略概括**：

  路径问答记录：
  {{ qa_text }}

  {{ context_note }}

  请只用一句话概括核心内容与中断原因，不需要细节。

# 最终报告生成
generate_report: |
  基于以下探索结果，生成一份关于目标问题的综合报告。

  目标问题:
  {{ goal }}

  已发现的事实（按重要性排序）:
  {{ facts }}

  主要探索路径:
  {{ main_paths }}

  关键见解:
  {{ key_insights }}

  要求:
  1. 报告应该全面回答目标问题
  2. 结构清晰，有逻辑层次
  3. 引用关键事实支持观点
  4. 指出认知的边界和不确定性
  5. 建议进一步探索的方向

  报告格式：
  # 核心结论

  ## 主要发现

  ## 关键事实

  ## 认知边界

  ## 建议探索方向

# 上下文压缩
compress_context: |
  将以下上下文压缩为最重要的事实列表，控制在 {{ token_limit }} tokens 以内。

  原始上下文:
  {{ context }}

  要求:
  1. 保留所有关键事实和数据
  2. 去除冗余和次要信息
  3. 保持逻辑关系清晰
  4. 输出为编号的事实列表

# 见解提取
extract_key_insights: |
  基于以下事实，提取 3-5 个最重要的见解：

  事实：
  {{ facts_text }}

  要求：
  1. 输出为纯 JSON 字符串列表，不要包含任何对象键值对。
  2. 每个见解具有深度，基于事实但高于事实。
  3. 格式严格遵守：["见解1", "见解2", "见解3"]。不要使用 {"insight": ...} 格式。

# 后续步骤建议
suggest_next_steps: |
  基于目前的探索状态和已发现的事实，建议 3-5 个具体的后续探索方向：

  探索目标：{{ goal }}

  已发现事实概览：
  {{ facts_summary }}

  要求：
  1. 建议必须具体可行
  2. 指向未被充分探索的领域或验证关键假设
  3. 输出为纯 JSON 字符串列表
  4. 格式示例：["建议1", "建议2"]

# 执行摘要生成
generate_executive_summary: |
  请为以下报告生成一个简洁的执行摘要（200字以内）：

  目标：{{ goal }}

  报告内容：
  {{ report_content }}...

  摘要应该包含：
  1. 主要发现
  2. 核心结论
  3. 关键建议

# 节点回答生成
process_node_answer: |
  你是一个深度思考助手。你的目标是回答用户的问题：{{ goal }}。请基于已知事实与逻辑进行回答。

  已知事实：
  {{ facts_text }}

  当前问题：{{ question }}

  请给出详细且有深度的回答：